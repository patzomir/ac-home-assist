<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AC Home Assist</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --card:    #22263a;
    --border:  #2e3350;
    --accent:  #4f8ef7;
    --heat:    #f97316;
    --cool:    #38bdf8;
    --green:   #22c55e;
    --red:     #ef4444;
    --muted:   #6b7280;
    --text:    #e2e8f0;
    --text2:   #94a3b8;
    --night:   #7c3aed;
    --day:     #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* --- Layout --- */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .tagline { font-size: 13px; color: var(--text2); margin-left: auto; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    flex-shrink: 0;
  }
  .dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* --- Status bar --- */
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: var(--text2);
    margin-bottom: 20px;
  }
  .outdoor-temp { font-size: 15px; color: var(--cool); font-weight: 500; }
  .refresh-indicator {
    margin-left: auto; font-size: 12px; color: var(--muted);
  }

  /* --- Unit cards --- */
  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 20px;
  }

  .unit-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .unit-header {
    padding: 16px 20px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .unit-header h2 { font-size: 16px; font-weight: 600; flex: 1; }
  .unit-addr { font-size: 11px; color: var(--muted); font-family: monospace; }

  /* --- Current reading --- */
  .current-row {
    padding: 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0 24px;
    align-items: center;
  }
  .power-big {
    font-size: 52px; font-weight: 700; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .power-big .unit-label { font-size: 20px; color: var(--text2); font-weight: 400; }
  .mode-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px;
  }
  .mode-heat { background: rgba(249,115,22,.18); color: var(--heat); }
  .mode-cool { background: rgba(56,189,248,.15); color: var(--cool); }
  .mode-off  { background: rgba(107,114,128,.15); color: var(--muted); }
  .mode-fan  { background: rgba(79,142,247,.15);  color: var(--accent); }
  .mode-auto { background: rgba(34,197,94,.15);   color: var(--green); }
  .setpoint-line {
    font-size: 13px; color: var(--text2); margin-top: 4px;
  }

  /* session cost */
  .session-cost {
    text-align: right;
  }
  .session-cost .amount {
    font-size: 28px; font-weight: 700; color: var(--heat);
    font-variant-numeric: tabular-nums;
  }
  .session-cost .label { font-size: 11px; color: var(--muted); }

  /* --- Cost grid --- */
  .cost-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: var(--border);
    border-top: 1px solid var(--border);
  }
  .cost-cell {
    background: var(--card); padding: 14px 16px; text-align: center;
  }
  .cost-cell .amount {
    font-size: 22px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .cost-cell .amount.saving { color: var(--green); }
  .cost-cell .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cost-cell .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* --- Chart --- */
  .chart-section {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .chart-section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 12px; }
  .chart-wrap { height: 130px; }

  /* --- Schedule --- */
  .schedule-section {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
  }
  .schedule-section h3 {
    font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .schedule-form {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px;
  }
  .form-group label {
    display: block; font-size: 11px; color: var(--muted);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px;
  }
  .form-group input, .form-group select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 10px;
    font-size: 14px;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: var(--accent);
  }
  .form-actions {
    grid-column: 1 / -1; display: flex; gap: 8px; margin-top: 4px;
    align-items: center;
  }
  .btn {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--text2);
                 border: 1px solid var(--border); }
  .btn-danger  { background: transparent; color: var(--red);
                 border: 1px solid color-mix(in srgb, var(--red) 40%, transparent);
                 padding: 5px 10px; font-size: 12px; }
  .btn-danger:hover { background: color-mix(in srgb, var(--red) 12%, transparent); }
  .save-status { font-size: 12px; color: var(--green); }

  /* --- Device type badge --- */
  .type-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; padding: 2px 7px; border-radius: 4px;
    color: var(--muted); background: rgba(107,114,128,.15);
    flex-shrink: 0;
  }

  /* --- Hub section --- */
  .section-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin: 0 0 10px;
  }
  .hubs-row {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-bottom: 24px;
  }
  .hub-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    min-width: 260px;
  }
  .hub-card .hub-info { flex: 1; min-width: 0; }
  .hub-card .hub-name {
    font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hub-card .hub-name:hover { color: var(--accent); }
  .hub-card .hub-meta {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    font-family: monospace;
  }
  .hub-card .hub-devices {
    font-size: 11px; color: var(--text2); margin-top: 4px;
  }
  .btn-scan {
    font-size: 11px; padding: 5px 10px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; white-space: nowrap;
  }
  .btn-scan:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-scan:disabled { opacity: .5; cursor: default; }
  .hub-scan-info { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .hub-scan-info .unknown-addr {
    color: var(--red); font-weight: 600;
  }
  .absent-badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 4px; background: color-mix(in srgb, var(--red) 15%, transparent);
    color: var(--red); margin-left: 6px; vertical-align: middle;
  }

  /* --- Overview / ToU panel --- */
  .overview-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
  }
  .tariff-info-bar {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    font-size: 13px; color: var(--text2);
  }
  .tariff-info-bar .night-rate { color: var(--night); font-weight: 600; }
  .tariff-info-bar .day-rate   { color: var(--day);   font-weight: 600; }
  .tariff-info-bar .best-time  { margin-left: auto; font-size: 12px; color: var(--green); }

  .tou-summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin: 14px 0 0;
  }
  .tou-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
  }
  .tou-card .tou-label {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  }
  .tou-card .tou-amount {
    font-size: 22px; font-weight: 700; margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .tou-card .tou-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .tou-card.day-card   .tou-amount { color: var(--day);   }
  .tou-card.night-card .tou-amount { color: var(--night); }

  /* --- Recommendations --- */
  .rec-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 16px;
  }
  .rec-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .rec-card {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
  }
  .rec-icon { font-size: 20px; flex-shrink: 0; line-height: 1.4; }
  .rec-body { flex: 1; }
  .rec-msg  { font-size: 13px; color: var(--text); }
  .rec-saving { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 3px; }

  /* --- Overview charts --- */
  .overview-chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 16px;
  }
  .overview-chart-title {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 12px;
  }
  .chart-wrap-lg { height: 160px; }
  .chart-wrap-sm { height: 90px; }

  /* --- Donut card --- */
  .donut-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 16px;
    display: grid; grid-template-columns: auto 1fr; gap: 0 20px; align-items: center;
  }
  .donut-wrap { width: 180px; height: 180px; }

  /* --- Heatmap --- */
  .heatmap-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; margin-bottom: 24px;
    overflow-x: auto;
  }
  .heatmap-grid-wrap { min-width: 600px; }
  .heatmap-hours {
    display: grid; grid-template-columns: 40px repeat(24, 1fr);
    gap: 2px; margin-bottom: 2px;
  }
  .heatmap-hours span { font-size: 9px; color: var(--muted); text-align: center; }
  .heatmap-row {
    display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px;
    margin-bottom: 2px;
  }
  .heatmap-day-label { font-size: 10px; color: var(--muted); line-height: 18px; }
  .heatmap-cell {
    height: 18px; border-radius: 2px;
    background: rgba(79,142,247,0.08);
    transition: opacity .2s;
  }

  /* --- Projection panel --- */
  .projection-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .projection-header {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px;
    margin-bottom: 14px;
  }
  .projection-header .cycle-range {
    font-size: 12px; color: var(--text2);
    text-transform: none; letter-spacing: 0; font-weight: 500;
  }
  .cycle-start-control {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; text-transform: none; letter-spacing: 0;
    color: var(--text2);
  }
  .cycle-start-control label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .cycle-start-control input {
    width: 52px; background: var(--card);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 4px 8px; font-size: 13px;
  }
  .cycle-start-control input:focus { outline: none; border-color: var(--accent); }
  .projection-totals {
    display: flex; flex-wrap: wrap; gap: 12px;
  }
  .proj-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    flex: 1; min-width: 140px;
  }
  .proj-card .proj-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .proj-card .proj-amount {
    font-size: 26px; font-weight: 700;
    font-variant-numeric: tabular-nums; margin-top: 4px;
  }
  .proj-card .proj-amount.spent  { color: var(--text); }
  .proj-card .proj-amount.projected { color: var(--heat); }
  .proj-card .proj-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .proj-progress-bar {
    height: 4px; background: var(--border); border-radius: 2px;
    margin-top: 10px; overflow: hidden;
  }
  .proj-progress-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width .4s ease;
  }

  /* --- Section headers --- */
  .devices-section { margin-bottom: 28px; }

  /* --- Empty state --- */
  .empty {
    text-align: center; padding: 80px 20px;
    color: var(--muted); font-size: 15px;
  }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* --- Spinner on load --- */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="dot" id="server-dot"></div>
  <h1>AC Home Assist</h1>
  <span class="tagline">Smart heating · Cost visibility</span>
</header>

<main>
  <div class="status-bar">
    <span id="outdoor-label">Outdoor: —</span>
    <span id="time-label"></span>
    <span class="refresh-indicator" id="refresh-label">Refreshing…</span>
  </div>

  <!-- Overview: tariff bar + ToU summary + recommendations -->
  <div id="overview-section" style="display:none">
    <div class="overview-panel">
      <div class="tariff-info-bar" id="tariff-info-bar"></div>
      <div class="tou-summary-grid" id="tou-summary-grid"></div>
    </div>

    <div class="rec-panel" id="rec-panel" style="display:none">
      <p class="section-label">Recommendations</p>
      <div class="rec-list" id="rec-list"></div>
    </div>

    <div class="overview-chart-card">
      <p class="overview-chart-title">Past 24 hours — all devices (day / night)</p>
      <div class="chart-wrap-lg"><canvas id="chart-hourly-global"></canvas></div>
    </div>

    <div class="donut-card" id="donut-card">
      <div class="donut-wrap"><canvas id="chart-donut"></canvas></div>
      <div>
        <p class="overview-chart-title" style="margin-bottom:8px">Cost by device — this week</p>
        <div id="donut-legend" style="font-size:12px;color:var(--text2);line-height:1.8"></div>
      </div>
    </div>

    <div class="heatmap-card" id="heatmap-card">
      <p class="overview-chart-title" style="margin-bottom:10px">Usage heatmap — last 7 days (all devices)</p>
      <div class="heatmap-grid-wrap" id="heatmap-grid"></div>
    </div>
  </div>

  <!-- Projection panel -->
  <div class="projection-panel" id="projection-panel" style="display:none">
    <div class="projection-header">
      Billing cycle projection
      <span class="cycle-range" id="proj-cycle-range"></span>
      <div class="cycle-start-control">
        <label for="cycle-start-input">Cycle starts on day</label>
        <input type="number" id="cycle-start-input" min="1" max="28" value="1">
      </div>
    </div>
    <div class="projection-totals" id="projection-totals"></div>
  </div>

  <!-- Hub status row -->
  <div id="hubs-section" style="display:none">
    <p class="section-label">Hubs</p>
    <div class="hubs-row" id="hubs-row"></div>
  </div>

  <!-- AC units -->
  <div id="units-section" class="devices-section" style="display:none">
    <p class="section-label">AC Units (IR Emitters)</p>
    <div class="units-grid" id="units-grid"></div>
  </div>

  <!-- Smart plugs -->
  <div id="plugs-section" class="devices-section" style="display:none">
    <p class="section-label">Smart Plugs</p>
    <div class="units-grid" id="plugs-grid"></div>
  </div>

  <div class="empty" id="empty-state"><div class="icon">📡</div>Waiting for hub data…</div>
</main>

<script>
/* ============================================================
   Dashboard — polling + rendering
   ============================================================ */

const API = '/api';
const REFRESH_MS = 30_000;

const charts = {};       // canvas_id → Chart instance
const saveStatus = {};   // emitter_id → timeout

/* ---------- billing cycle start day (persisted) ---------- */

let cycleStartDay = parseInt(localStorage.getItem('cycleStartDay') || '1', 10);

function initCycleStartInput() {
  const input = document.getElementById('cycle-start-input');
  if (!input) return;
  input.value = cycleStartDay;
  input.addEventListener('change', () => {
    const v = Math.max(1, Math.min(28, parseInt(input.value, 10) || 1));
    input.value = v;
    cycleStartDay = v;
    localStorage.setItem('cycleStartDay', v);
    fetchAndRender();
  });
}

/* ---------- fetch + render loop ---------- */

async function fetchAndRender() {
  setRefreshLabel('Refreshing…');
  try {
    const res = await fetch(`${API}/dashboard/?cycle_start=${cycleStartDay}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
    setRefreshLabel(`Updated ${formatTime(new Date())}`);
    document.getElementById('server-dot').classList.remove('offline');
  } catch (e) {
    setRefreshLabel('Connection lost');
    document.getElementById('server-dot').classList.add('offline');
  }
}

function setRefreshLabel(txt) {
  document.getElementById('refresh-label').textContent = txt;
}

function formatTime(d) {
  return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

/* ---------- main render ---------- */

function render(data) {
  /* outdoor temp */
  const ot = data.outdoor_temp_c;
  document.getElementById('outdoor-label').textContent =
    ot !== null ? `Outdoor: ${ot.toFixed(1)} °C` : 'Outdoor: —';

  const hasHubs  = data.hubs  && data.hubs.length  > 0;
  const hasUnits = data.units && data.units.length  > 0;
  const hasPlugs = data.plugs && data.plugs.length  > 0;

  const emptyState = document.getElementById('empty-state');
  if (!hasHubs && !hasUnits && !hasPlugs) {
    emptyState.style.display = '';
    return;
  }
  emptyState.style.display = 'none';

  /* overview: tariff, recommendations, global charts */
  if (hasUnits || hasPlugs) {
    document.getElementById('overview-section').style.display = '';
    renderOverview(data);
  } else {
    document.getElementById('overview-section').style.display = 'none';
  }

  /* projection panel */
  if ((hasUnits || hasPlugs) && data.cycle) {
    renderProjectionPanel(data);
  }

  /* hubs */
  const hubsSection = document.getElementById('hubs-section');
  const hubsRow = document.getElementById('hubs-row');
  if (hasHubs) {
    hubsSection.style.display = '';
    const existingHubIds = new Set([...hubsRow.querySelectorAll('[data-hub-id]')].map(el => el.dataset.hubId));
    data.hubs.forEach(h => {
      if (!existingHubIds.has(String(h.id))) hubsRow.appendChild(buildHubCard(h));
    });
    data.hubs.forEach(h => updateHubCard(h));
  } else {
    hubsSection.style.display = 'none';
  }

  /* AC units */
  const unitsSection = document.getElementById('units-section');
  const unitsGrid = document.getElementById('units-grid');
  if (hasUnits) {
    unitsSection.style.display = '';
    const liveUnitIds = new Set(data.units.map(u => String(u.id)));
    [...unitsGrid.querySelectorAll('[data-unit-id]')].forEach(el => {
      if (!liveUnitIds.has(el.dataset.unitId)) el.remove();
    });
    data.units.forEach(u => {
      if (!unitsGrid.querySelector(`[data-unit-id="${u.id}"]`)) unitsGrid.appendChild(buildCard(u));
    });
    data.units.forEach(u => updateCard(u));
  } else {
    unitsSection.style.display = 'none';
  }

  /* smart plugs */
  const plugsSection = document.getElementById('plugs-section');
  const plugsGrid = document.getElementById('plugs-grid');
  if (hasPlugs) {
    plugsSection.style.display = '';
    const livePlugIds = new Set(data.plugs.map(p => String(p.id)));
    [...plugsGrid.querySelectorAll('[data-plug-id]')].forEach(el => {
      if (!livePlugIds.has(el.dataset.plugId)) el.remove();
    });
    data.plugs.forEach(p => {
      if (!plugsGrid.querySelector(`[data-plug-id="${p.id}"]`)) plugsGrid.appendChild(buildPlugCard(p));
    });
    data.plugs.forEach(p => updatePlugCard(p));
  } else {
    plugsSection.style.display = 'none';
  }
}

/* ---------- projection panel ---------- */

function renderProjectionPanel(data) {
  const panel = document.getElementById('projection-panel');
  if (!panel) return;
  panel.style.display = '';

  const cycle = data.cycle;
  const pct = Math.min(100, Math.round((cycle.days_elapsed / cycle.total_days) * 100));

  // Cycle date range label
  const rangeEl = document.getElementById('proj-cycle-range');
  if (rangeEl) {
    rangeEl.textContent =
      `${fmtDate(cycle.start_date)} – ${fmtDate(cycle.end_date)}` +
      `  ·  day ${Math.floor(cycle.days_elapsed)} of ${cycle.total_days}`;
  }

  // Sum totals across all devices
  const allDevices = [...(data.units || []), ...(data.plugs || [])];
  let totalSpent = 0, totalProjected = 0, hasProjection = false;
  allDevices.forEach(d => {
    const c = d.cost || {};
    totalSpent += c.cycle_bgn || 0;
    if (c.cycle_projected_bgn != null) { totalProjected += c.cycle_projected_bgn; hasProjection = true; }
  });

  const totalsEl = document.getElementById('projection-totals');
  if (!totalsEl) return;
  totalsEl.innerHTML = `
    <div class="proj-card">
      <div class="proj-label">Spent this cycle</div>
      <div class="proj-amount spent">${totalSpent.toFixed(2)} <span style="font-size:14px;font-weight:400;color:var(--text2)">BGN</span></div>
      <div class="proj-sub">${cycle.days_elapsed.toFixed(1)} of ${cycle.total_days} days</div>
      <div class="proj-progress-bar"><div class="proj-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="proj-card">
      <div class="proj-label">Projected full cycle</div>
      <div class="proj-amount projected">${hasProjection ? totalProjected.toFixed(2) : '—'} <span style="font-size:14px;font-weight:400;color:var(--text2)">${hasProjection ? 'BGN' : ''}</span></div>
      <div class="proj-sub">${hasProjection ? `at current rate · ${cycle.total_days}-day cycle` : 'Not enough data yet'}</div>
    </div>
  `;
}

function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function buildHubCard(h) {
  const card = document.createElement('div');
  card.className = 'hub-card';
  card.dataset.hubId = h.id;
  card.innerHTML = `
    <div class="dot offline" id="hub-dot-${h.id}"></div>
    <div class="hub-info">
      <div class="hub-name" id="hub-name-${h.id}" title="Click to rename">${esc(h.name)}</div>
      <div class="hub-meta" id="hub-id-${h.id}">${esc(h.identifier.slice(0, 16))}</div>
      <div class="hub-devices" id="hub-devices-${h.id}"></div>
    </div>
    <button class="btn-scan" id="hub-scan-${h.id}" title="Scan Zigbee network">Scan</button>
    <span class="type-badge">Hub</span>
  `;
  card.querySelector(`#hub-name-${h.id}`).addEventListener('click', () => renameHub(h.id));
  card.querySelector(`#hub-scan-${h.id}`).addEventListener('click', () => scanHubNetwork(h.id));
  // scan info line lives inside hub-info, added once
  const scanInfo = document.createElement('div');
  scanInfo.className = 'hub-scan-info';
  scanInfo.id = `hub-scan-info-${h.id}`;
  card.querySelector('.hub-info').appendChild(scanInfo);
  return card;
}

async function scanHubNetwork(hubId) {
  const btn = document.getElementById(`hub-scan-${hubId}`);
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.textContent = 'Scanning…';
  try {
    const res = await fetch(`${API}/hubs/pk/${hubId}/scan/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (!res.ok) {
      const text = await res.text();
      console.error(`Scan failed (${res.status}):`, text);
      btn.textContent = `Error ${res.status}`;
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Scan'; }, 3000);
      return;
    }
    // Give the hub a moment to respond on MQTT, then refresh the dashboard.
    btn.textContent = 'Waiting…';
    setTimeout(async () => {
      await fetchAndRender();
      btn.disabled = false;
      btn.textContent = 'Scan';
    }, 3000);
  } catch (e) {
    console.error('Scan request failed', e);
    btn.textContent = 'Error';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Scan'; }, 3000);
  }
}

function updateHubCard(h) {
  const dot = document.getElementById(`hub-dot-${h.id}`);
  if (dot) dot.classList.toggle('offline', !h.online);

  const nameEl = document.getElementById(`hub-name-${h.id}`);
  if (nameEl) nameEl.textContent = h.name;

  const devEl = document.getElementById(`hub-devices-${h.id}`);
  if (devEl) {
    const parts = [];
    if (h.emitter_count > 0) parts.push(`${h.emitter_count} IR emitter${h.emitter_count > 1 ? 's' : ''}`);
    if (h.plug_count > 0)    parts.push(`${h.plug_count} plug${h.plug_count > 1 ? 's' : ''}`);
    devEl.textContent = parts.length ? parts.join(', ') : 'No devices paired';
  }

  const scanEl = document.getElementById(`hub-scan-info-${h.id}`);
  if (scanEl) {
    if (!h.last_scan) {
      scanEl.textContent = '';
    } else {
      const ts = new Date(h.last_scan.ts).toLocaleTimeString();
      let html = `Last scan ${ts} · ${h.last_scan.count} addr${h.last_scan.count !== 1 ? 's' : ''}`;
      if (h.last_scan.unknown.length > 0) {
        const addrs = h.last_scan.unknown.map(a => `0x${a.toString(16).toUpperCase().padStart(4,'0')}`).join(', ');
        html += ` · <span class="unknown-addr">Unknown: ${esc(addrs)}</span>`;
      }
      scanEl.innerHTML = html;
    }
  }
}

/* ---------- overview / ToU ---------- */

function renderOverview(data) {
  const tariff = data.tariff || {};
  const allDevices = [...(data.units || []), ...(data.plugs || [])];

  // Tariff info bar
  const infoBar = document.getElementById('tariff-info-bar');
  if (infoBar && tariff.rate_day_bgn) {
    const ns = String(tariff.night_start).padStart(2,'0');
    const ne = String(tariff.night_end).padStart(2,'0');
    infoBar.innerHTML =
      `<span>Tariff zones:</span>` +
      `<span class="night-rate">Night ${ns}:00–${ne}:00 · ${tariff.rate_night_bgn.toFixed(4)} BGN/kWh</span>` +
      `<span style="color:var(--muted)">|</span>` +
      `<span class="day-rate">Day · ${tariff.rate_day_bgn.toFixed(4)} BGN/kWh</span>` +
      `<span class="best-time">Cheapest window: tonight ${ns}:00–${ne}:00</span>`;
  }

  // ToU summary cards (today totals)
  let totDayKwh = 0, totNightKwh = 0, totDayCost = 0, totNightCost = 0;
  allDevices.forEach(d => {
    const c = d.cost || {};
    totDayKwh    += c.today_day_kwh    || 0;
    totNightKwh  += c.today_night_kwh  || 0;
    totDayCost   += c.today_day_bgn    || 0;
    totNightCost += c.today_night_bgn  || 0;
  });
  const grid = document.getElementById('tou-summary-grid');
  if (grid) {
    grid.innerHTML = `
      <div class="tou-card day-card">
        <div class="tou-label">Day kWh (today)</div>
        <div class="tou-amount">${totDayKwh.toFixed(3)}</div>
        <div class="tou-sub">kWh</div>
      </div>
      <div class="tou-card day-card">
        <div class="tou-label">Day cost (today)</div>
        <div class="tou-amount">${totDayCost.toFixed(4)}</div>
        <div class="tou-sub">BGN</div>
      </div>
      <div class="tou-card night-card">
        <div class="tou-label">Night kWh (today)</div>
        <div class="tou-amount">${totNightKwh.toFixed(3)}</div>
        <div class="tou-sub">kWh</div>
      </div>
      <div class="tou-card night-card">
        <div class="tou-label">Night cost (today)</div>
        <div class="tou-amount">${totNightCost.toFixed(4)}</div>
        <div class="tou-sub">BGN</div>
      </div>
    `;
  }

  // Recommendations
  renderRecommendations(data.recommendations || []);

  // Global 24h hourly chart — sum across all devices
  const hourlyMap = {};
  allDevices.forEach(d => {
    (d.hourly || []).forEach(h => {
      if (!hourlyMap[h.hour]) hourlyMap[h.hour] = { kwh: 0, cost: 0, period: h.period, partial: h.partial };
      hourlyMap[h.hour].kwh  += h.kwh;
      hourlyMap[h.hour].cost += h.cost_bgn;
    });
  });
  const sortedHours = Object.keys(hourlyMap).sort();
  const globalHourly = sortedHours.map(h => ({ hour: h, ...hourlyMap[h] }));
  updateHourlyChart('chart-hourly-global', globalHourly);

  // Donut — weekly cost per device
  updateDonutChart(allDevices);

  // Heatmap — use daily breakdown
  updateHeatmap(allDevices);
}

function renderRecommendations(recs) {
  const panel = document.getElementById('rec-panel');
  const list  = document.getElementById('rec-list');
  if (!panel || !list) return;
  if (!recs || recs.length === 0) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  const icons = { shift_ac: '❄️', shift_plug: '🔌', preheat_tip: '🌅', global_tip: '💡' };
  list.innerHTML = recs.map(r => `
    <div class="rec-card">
      <div class="rec-icon">${icons[r.type] || '💡'}</div>
      <div class="rec-body">
        <div class="rec-msg">${esc(r.message)}</div>
        ${r.potential_saving_bgn > 0
          ? `<div class="rec-saving">Save ~${r.potential_saving_bgn.toFixed(2)} BGN/month</div>`
          : ''}

    </div>
  `).join('');
}

function _chartScaleOpts() {
  return {
    x: {
      grid: { color: 'rgba(46,51,80,0.5)' },
      ticks: { color: '#6b7280', font: { size: 11 } },
      stacked: true,
    },
    y: {
      grid: { color: 'rgba(46,51,80,0.5)' },
      ticks: { color: '#6b7280', font: { size: 11 }, callback: v => v.toFixed(2) },
      beginAtZero: true,
      stacked: true,
    }
  };
}

function updateStackedDailyChart(canvasId, daily) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const labels    = daily.map(d => d.date);
  const dayVals   = daily.map(d => d.day_cost_bgn   || 0);
  const nightVals = daily.map(d => d.night_cost_bgn || 0);

  if (charts[canvasId]) {
    charts[canvasId].data.labels = labels;
    charts[canvasId].data.datasets[0].data = dayVals;
    charts[canvasId].data.datasets[1].data = nightVals;
    charts[canvasId].update('none');
    return;
  }

  charts[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Day',
          data: dayVals,
          backgroundColor: 'rgba(245,158,11,0.75)',
          borderRadius: 3,
          borderSkipped: false,
          stack: 'cost',
        },
        {
          label: 'Night',
          data: nightVals,
          backgroundColor: 'rgba(124,58,237,0.75)',
          borderRadius: 3,
          borderSkipped: false,
          stack: 'cost',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(4)} BGN (${ctx.dataset.label})` } }
      },
      scales: _chartScaleOpts(),
    }
  });
}

function updateHourlyChart(canvasId, hourly) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (!hourly || hourly.length === 0) return;

  const labels  = hourly.map(h => h.hour);
  const values  = hourly.map(h => h.kwh || 0);
  const bgColors = hourly.map((h, i) => {
    const isNight = h.period === 'night';
    const alpha   = (h.partial) ? 0.35 : 0.70;
    return isNight
      ? `rgba(124,58,237,${alpha})`
      : `rgba(245,158,11,${alpha})`;
  });

  if (charts[canvasId]) {
    charts[canvasId].data.labels = labels;
    charts[canvasId].data.datasets[0].data = values;
    charts[canvasId].data.datasets[0].backgroundColor = bgColors;
    charts[canvasId].update('none');
    return;
  }

  charts[canvasId] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderRadius: 2,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(4)} kWh` } }
      },
      scales: {
        x: {
          grid: { color: 'rgba(46,51,80,0.5)' },
          ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 0,
                   callback: (_, i) => (i % 3 === 0 ? labels[i] : '') }
        },
        y: {
          grid: { color: 'rgba(46,51,80,0.5)' },
          ticks: { color: '#6b7280', font: { size: 10 }, callback: v => v.toFixed(3) },
          beginAtZero: true,
        }
      }
    }
  });
}

/* ---------- donut + heatmap ---------- */

const DONUT_PALETTE = [
  'rgba(79,142,247,0.85)',  'rgba(249,115,22,0.85)',  'rgba(34,197,94,0.85)',
  'rgba(245,158,11,0.85)',  'rgba(124,58,237,0.85)',  'rgba(56,189,248,0.85)',
  'rgba(239,68,68,0.85)',   'rgba(168,85,247,0.85)',
];

function updateDonutChart(devices) {
  const canvas = document.getElementById('chart-donut');
  if (!canvas) return;

  const labels = [], values = [], colors = [];
  devices.forEach((d, i) => {
    const w = (d.cost || {}).week_bgn || 0;
    if (w > 0) {
      labels.push(d.name);
      values.push(w);
      colors.push(DONUT_PALETTE[i % DONUT_PALETTE.length]);
    }
  });

  const legendEl = document.getElementById('donut-legend');
  if (legendEl) {
    legendEl.innerHTML = labels.map((l, i) =>
      `<div style="display:flex;align-items:center;gap:6px">
         <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};flex-shrink:0"></span>
         ${esc(l)} — ${values[i].toFixed(4)} BGN
       </div>`
    ).join('');
  }

  if (charts['donut']) {
    charts['donut'].data.labels  = labels;
    charts['donut'].data.datasets[0].data = values;
    charts['donut'].data.datasets[0].backgroundColor = colors;
    charts['donut'].update('none');
    return;
  }
  if (labels.length === 0) return;

  charts['donut'] = new Chart(canvas, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.toFixed(4)} BGN` } }
      },
      cutout: '62%',
    }
  });
}

function updateHeatmap(devices) {
  const container = document.getElementById('heatmap-grid');
  if (!container) return;

  // Build 7 × 24 matrix from per-device daily breakdown (day_cost_bgn + night_cost_bgn → per-slot)
  // We use the daily data to get day/night per-day totals, then we use hourly data if available
  // to distribute within each day. Fallback: split proportionally using night tariff hours.
  const DAYS = 7, HOURS = 24;
  const matrix = Array.from({ length: DAYS }, () => new Float32Array(HOURS));

  devices.forEach(dev => {
    // Build per-hour data from hourly array (covers last 24h = today + part of yesterday)
    const hourlyByHour = {};
    (dev.hourly || []).forEach(h => {
      const hr = parseInt(h.hour.split(':')[0], 10);
      hourlyByHour[hr] = (hourlyByHour[hr] || 0) + (h.kwh || 0);
    });

    // For the most recent day, use hourly data
    const todayRow = matrix[DAYS - 1];
    Object.entries(hourlyByHour).forEach(([hr, kwh]) => {
      todayRow[parseInt(hr, 10)] += kwh;
    });

    // For older days, distribute daily kWh proportionally across hours
    // Use is_night_hour pattern: night hours get lower weight (they're cheaper)
    const NIGHT_S = 22, NIGHT_E = 6;
    function isNight(h) { return h >= NIGHT_S || h < NIGHT_E; }
    (dev.daily || []).slice(0, DAYS - 1).forEach((day, di) => {
      const totalKwh = day.kwh || 0;
      if (totalKwh === 0) return;
      const nightKwh = day.night_kwh || 0;
      const dayKwh   = day.day_kwh   || 0;
      const nightHrs = 8, dayHrs = 16;
      for (let h = 0; h < HOURS; h++) {
        matrix[di][h] += isNight(h)
          ? nightKwh / nightHrs
          : dayKwh   / dayHrs;
      }
    });
  });

  // Normalise to 0–1
  let maxVal = 0;
  for (let d = 0; d < DAYS; d++) for (let h = 0; h < HOURS; h++) if (matrix[d][h] > maxVal) maxVal = matrix[d][h];

  // Build DOM
  const hourLabels = Array.from({ length: HOURS }, (_, i) => i % 3 === 0 ? String(i).padStart(2,'0') : '');
  const dayLabels  = (devices[0]?.daily || []).map(d => d.date.split(' ')[0]);
  while (dayLabels.length < DAYS) dayLabels.unshift('');

  let html = `<div class="heatmap-hours"><span></span>${hourLabels.map(l => `<span>${l}</span>`).join('')}</div>`;
  for (let d = 0; d < DAYS; d++) {
    html += `<div class="heatmap-row"><span class="heatmap-day-label">${esc(dayLabels[d] || '')}</span>`;
    for (let h = 0; h < HOURS; h++) {
      const intensity = maxVal > 0 ? matrix[d][h] / maxVal : 0;
      const alpha = (0.06 + intensity * 0.80).toFixed(2);
      html += `<div class="heatmap-cell" style="background:rgba(79,142,247,${alpha})" title="${matrix[d][h].toFixed(4)} kWh"></div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

/* ---------- schedule ---------- */

async function loadSchedule(emitterId) {
  try {
    const res = await fetch(`${API}/emitters/${emitterId}/schedule/`);
    if (!res.ok) return;
    const s = await res.json();
    if (!s || !s.comfort_temp_c) return;

    setVal(`sched-comfort-${emitterId}`,  s.comfort_temp_c);
    setVal(`sched-setback-${emitterId}`,  s.setback_temp_c);
    setVal(`sched-preheat-${emitterId}`,  s.preheat_minutes);
    setVal(`sched-mode-${emitterId}`,     s.mode);
    setVal(`sched-sleep-${emitterId}`,    `${String(s.sleep_hour).padStart(2,'0')}:${String(s.sleep_minute).padStart(2,'0')}`);
    setVal(`sched-wake-${emitterId}`,     `${String(s.wake_hour).padStart(2,'0')}:${String(s.wake_minute).padStart(2,'0')}`);
    const cb = document.getElementById(`sched-enabled-${emitterId}`);
    if (cb) cb.checked = s.enabled;
  } catch (_) {}
}

async function saveSchedule(event, emitterId) {
  event.preventDefault();

  const sleep = getVal(`sched-sleep-${emitterId}`).split(':');
  const wake  = getVal(`sched-wake-${emitterId}`).split(':');

  const payload = {
    comfort_temp_c:  parseInt(getVal(`sched-comfort-${emitterId}`)),
    setback_temp_c:  parseInt(getVal(`sched-setback-${emitterId}`)),
    preheat_minutes: parseInt(getVal(`sched-preheat-${emitterId}`)),
    mode:            getVal(`sched-mode-${emitterId}`),
    sleep_hour:      parseInt(sleep[0]),
    sleep_minute:    parseInt(sleep[1]),
    wake_hour:       parseInt(wake[0]),
    wake_minute:     parseInt(wake[1]),
    enabled:         document.getElementById(`sched-enabled-${emitterId}`)?.checked ?? true,
  };

  try {
    const res = await fetch(`${API}/emitters/${emitterId}/schedule/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(res.status);
    showSaveStatus(emitterId, 'Saved & queued for hub');
  } catch (e) {
    showSaveStatus(emitterId, 'Save failed');
  }
}

function showSaveStatus(emitterId, msg) {
  const el = document.getElementById(`save-status-${emitterId}`);
  if (!el) return;
  el.textContent = msg;
  clearTimeout(saveStatus[emitterId]);
  saveStatus[emitterId] = setTimeout(() => { el.textContent = ''; }, 4000);
}

/* ---------- plug cards ---------- */

function buildPlugCard(p) {
  const card = document.createElement('div');
  card.className = 'unit-card';
  card.dataset.plugId = p.id;
  card.innerHTML = `
    <div class="unit-header">
      <div class="dot offline" id="plug-dot-${p.id}"></div>
      <h2 id="plug-name-${p.id}" data-plug-id="${p.id}"
          title="Click to rename" style="cursor:pointer">${esc(p.name)}</h2>
      <span class="type-badge">Smart Plug</span>
      <span class="unit-addr">${esc(p.addr)}</span>
      <button class="btn btn-danger" id="del-plug-${p.id}" title="Remove this device">Remove</button>
    </div>

    <div class="current-row">
      <div>
        <div class="power-big" id="plug-watts-${p.id}">—<span class="unit-label"> W</span></div>
        <div class="setpoint-line" id="plug-status-${p.id}"></div>
      </div>
      <div>
        <span class="mode-badge mode-off" id="plug-badge-${p.id}">off</span>
      </div>
      <div class="session-cost">
        <div class="amount" id="plug-session-cost-${p.id}">—</div>
        <div class="label">BGN · session</div>
        <div class="sub" id="plug-session-kwh-${p.id}"></div>
      </div>
    </div>

    <div class="cost-row">
      <div class="cost-cell">
        <div class="amount" id="plug-today-${p.id}">—</div>
        <div class="label">BGN today</div>
        <div class="sub" id="plug-today-kwh-${p.id}"></div>
      </div>
      <div class="cost-cell">
        <div class="amount" id="plug-week-${p.id}">—</div>
        <div class="label">BGN this week</div>
      </div>
      <div class="cost-cell">
        <div class="amount" id="plug-month-${p.id}">—</div>
        <div class="label">BGN this month</div>
      </div>
      <div class="cost-cell">
        <div class="amount" id="plug-proj-${p.id}">—</div>
        <div class="label">BGN projected</div>
        <div class="sub" id="plug-proj-cycle-${p.id}"></div>
      </div>
    </div>

    <div class="chart-section">
      <h3>7-day consumption — day vs night</h3>
      <div class="chart-wrap"><canvas id="plug-chart-${p.id}"></canvas></div>
    </div>

    <div class="chart-section" style="border-top:none;padding-top:4px">
      <h3>Past 24 hours</h3>
      <div class="chart-wrap-sm"><canvas id="plug-chart-h-${p.id}"></canvas></div>
    </div>
  `;

  card.querySelector(`#plug-name-${p.id}`).addEventListener('click', () => renamePlug(p.id));
  card.querySelector(`#del-plug-${p.id}`).addEventListener('click', () => deletePlug(p.id, card));
  return card;
}

function updatePlugCard(p) {
  const cur  = p.current || {};
  const cost = p.cost    || {};

  const dot = document.getElementById(`plug-dot-${p.id}`);
  if (dot) dot.classList.toggle('offline', !p.online);

  // Absent-from-network badge — only shown when a scan has been run and plug wasn't in it
  const nameEl = document.getElementById(`plug-name-${p.id}`);
  if (nameEl) {
    const existing = nameEl.parentElement.querySelector('.absent-badge');
    if (p.in_last_scan === false) {
      if (!existing) {
        const badge = document.createElement('span');
        badge.className = 'absent-badge';
        badge.title = 'This plug was not found in the last network scan';
        badge.textContent = 'not in network';
        nameEl.insertAdjacentElement('afterend', badge);
      }
    } else {
      if (existing) existing.remove();
    }
  }

  setText(`plug-watts-${p.id}`,
    cur.watts !== undefined
      ? `${cur.watts}<span class="unit-label"> W</span>`
      : '—<span class="unit-label"> W</span>',
    /*html=*/true);

  setText(`plug-status-${p.id}`, p.power_on ? 'Plug on' : 'Plug off');

  const badge = document.getElementById(`plug-badge-${p.id}`);
  if (badge) {
    if (p.power_on) {
      badge.textContent = 'On';
      badge.className = 'mode-badge mode-auto';
    } else {
      badge.textContent = 'Off';
      badge.className = 'mode-badge mode-off';
    }
  }

  setText(`plug-session-cost-${p.id}`, fmt(cost.session_bgn));
  setText(`plug-session-kwh-${p.id}`,  cost.session_kwh ? `${cost.session_kwh.toFixed(3)} kWh` : '');
  setText(`plug-today-${p.id}`,  fmt(cost.today_bgn));
  setText(`plug-today-kwh-${p.id}`, cost.today_kwh ? `${cost.today_kwh.toFixed(3)} kWh` : '');
  setText(`plug-week-${p.id}`,   fmt(cost.week_bgn));
  setText(`plug-month-${p.id}`,  fmt(cost.month_bgn));

  /* projected */
  const plugProjEl = document.getElementById(`plug-proj-${p.id}`);
  if (plugProjEl) {
    const hasProj = cost.cycle_projected_bgn != null;
    plugProjEl.textContent = hasProj ? cost.cycle_projected_bgn.toFixed(2) : '—';
    plugProjEl.style.color = hasProj ? 'var(--heat)' : '';
  }
  setText(`plug-proj-cycle-${p.id}`, cost.cycle_bgn != null ? `${cost.cycle_bgn.toFixed(4)} so far` : '');

  updateStackedDailyChart(`plug-chart-${p.id}`, p.daily || []);
  updateHourlyChart(`plug-chart-h-${p.id}`, p.hourly || []);
}

/* ---------- rename ---------- */

async function renameHub(hubId) {
  const nameEl = document.getElementById(`hub-name-${hubId}`);
  if (!nameEl) return;
  const current = nameEl.textContent;
  const newName = prompt('Rename hub:', current);
  if (!newName || newName === current) return;

  try {
    const res = await fetch(`${API}/hubs/pk/${hubId}/`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
      body: JSON.stringify({ name: newName }),

}

/* ---------- delete ---------- */

async function deleteEmitter(emitterId, cardEl) {
  if (!confirm('Remove this IR emitter from the dashboard? This will also clear its schedule on the hub.')) return;
  try {
    const res = await fetch(`${API}/emitters/${emitterId}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (!res.ok) throw new Error(res.status);
    cardEl.remove();
  } catch (e) {
    alert(`Failed to remove device (${e.message})`);
  }
}

async function deletePlug(plugId, cardEl) {
  if (!confirm('Remove this smart plug from the dashboard?')) return;
  try {
    const res = await fetch(`${API}/plugs/${plugId}/`, {
      method: 'DELETE',
      headers: { 'X-CSRFToken': getCsrfToken() },
    });
    if (!res.ok) throw new Error(res.status);
    cardEl.remove();
  } catch (e) {
    alert(`Failed to remove device (${e.message})`);
  }
}

/* ---------- helpers ---------- */

function setText(id, val, html = false) {
  const el = document.getElementById(id);
  if (!el) return;
  if (html) el.innerHTML = val; else el.textContent = val;
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

function getVal(id) {
  return document.getElementById(id)?.value ?? '';
}

function fmt(val) {
  if (val === undefined || val === null) return '—';
  return val.toFixed(4);
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function getCsrfToken() {
  const match = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
  return match ? match[1] : '';
}
